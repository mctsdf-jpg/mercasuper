<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventario Mercasuper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h2 class="mb-4">Lista de Productos - Mercasuper</h2>
    <a th:href="@{/productos/nuevo}" class="btn btn-primary mb-3">Nuevo Producto</a>
    <table class="table table-striped align-middle">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Imagen</th> <th>Nombre</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${productos}">
                <td th:text="${p.id}">1</td>
                <td>
                    <img th:src="@{'/img/' + ${p.imagen}}" 
                         alt="Foto" 
                         style="width: 60px; height: 60px; object-fit: cover;" 
                         class="rounded border shadow-sm">
                </td>
                <td th:text="${p.nombre}">Producto</td>
                <td th:text="${p.descripcion}">Descripción</td>
                <td th:text="${'$' + p.precio}">$0.00</td>
                <td>
                    <a th:href="@{/productos/editar/{id}(id=${p.id})}" 
                        accesskey=""class="btn btn-sm btn-outline-primary">Editar</a>
                    <a th:href="@{/productos/eliminar/{id}(id=${p.id})}" 
                        class="btn btn-sm btn-outline-danger" 
                        onclick="return confirm('¿Estás seguro de eliminar este producto?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(productos)}" class="alert alert-info">
        No hay productos registrados en la base de datos.
    </div>

</body>
</html>
