<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Producto - Mercasuper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h3>Registrar Nuevo Producto</h3>
        </div>
        <div class="card-body">
            <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
                <input type="hidden" th:field="*{id}">
                
                <div class="mb-3">
                    <label class="form-label">Nombre:</label>
                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Arroz 1kg" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Precio:</label>
                    <input type="number" step="0.01" th:field="*{precio}" class="form-control" placeholder="0.00" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripción:</label>
                    <textarea th:field="*{descripcion}" class="form-control" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nombre del archivo de imagen (opcional):</label>
                    <input type="text" th:field="*{imagen}" class="form-control" placeholder="ejemplo: producto1.jpg">
                    <small class="text-muted">Escribe el nombre de la imagen que subirás a la carpeta /static/img/</small>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success">Guardar Producto</button>
                    <a href="/productos" class="btn btn-secondary">Volver a la lista</a>
                </div>
            </form>
            
        </div>
    </div>
</body>
</html>
