<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Producto - Mercasuper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5" style="background-color: #f8f9fa;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="text-center mb-0" th:text="${producto.id == null ? 'Nuevo Producto' : 'Editar Producto'}">Formulario</h3>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
                        
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre del Producto</label>
                            <input type="text" th:field="*{nombre}" class="form-control" required placeholder="Ej: Arroz Diana 1kg">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Descripción</label>
                            <textarea th:field="*{descripcion}" class="form-control" rows="3" placeholder="Breve descripción del producto..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Precio ($)</label>
                            <input type="number" step="0.01" th:field="*{precio}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre de la Imagen</label>
                            <input type="text" th:field="*{imagen}" class="form-control" required placeholder="Ej: arroz.png">
                            <small class="text-muted">La imagen debe estar guardada en la carpeta /img/</small>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success">Guardar Cambios</button>
                            <a th:href="@{/productos}" class="btn btn-outline-secondary">Volver al Inventario</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
